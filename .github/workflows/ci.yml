name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (${{ matrix.os }}, JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        java:
          - '21'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Show tool versions
        shell: bash
        run: |
          java -version
          ./gradlew --version

      - name: Build, test, and generate Javadoc
        shell: bash
        run: ./gradlew clean check javadoc --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}-jdk${{ matrix.java }}
          if-no-files-found: ignore
          path: |
            build/reports/tests/
            build/test-results/

      - name: Upload Javadoc on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: javadoc-${{ matrix.os }}-jdk${{ matrix.java }}
          if-no-files-found: ignore
          path: build/docs/javadoc/
